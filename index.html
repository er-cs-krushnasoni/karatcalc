  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>

    <!-- Console blocker — active only in secure/production mode -->
    <script>
      window.blockConsoleWhenSecure = function() {
        const noop = function() {};
        const methods = [
          'log', 'info', 'warn', 'debug', 'trace',
          'dir', 'dirxml', 'table', 'group', 'groupEnd',
          'groupCollapsed', 'clear', 'count', 'countReset',
          'time', 'timeEnd', 'timeLog', 'timeStamp',
          'profile', 'profileEnd', 'assert'
        ];
        methods.forEach(method => {
          if (console[method]) console[method] = noop;
        });
        const originalError = console.error;
        console.error = function(...args) {
          const message = args.join(' ');
          if (message.includes('Download the React DevTools') ||
              message.includes('[vite]') ||
              message.includes('SW registered')) return;
          originalError.apply(console, args);
        };
      };

      window.restoreConsole = function() {
        location.reload();
      };
    </script>
  </body>
