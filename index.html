<script>
  // Block console logs only when secure mode is active
  window.blockConsoleWhenSecure = function() {
    const noop = function() {};
    const methods = [
      'log', 'info', 'warn', 'debug', 'trace',
      'dir', 'dirxml', 'table', 'group', 'groupEnd', 
      'groupCollapsed', 'clear', 'count', 'countReset',
      'time', 'timeEnd', 'timeLog', 'timeStamp',
      'profile', 'profileEnd', 'assert'
    ];
    
    methods.forEach(method => {
      if (console[method]) {
        console[method] = noop;
      }
    });
    
    // Keep errors for critical issues only
    const originalError = console.error;
    console.error = function(...args) {
      const message = args.join(' ');
      // Filter out non-critical errors
      if (message.includes('Download the React DevTools') ||
          message.includes('[vite]') ||
          message.includes('SW registered')) {
        return;
      }
      originalError.apply(console, args);
    };
  };
  
  window.restoreConsole = function() {
    // This would need to store originals first to restore properly
    location.reload(); // Simple way to restore
  };
</script>
